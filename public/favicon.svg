<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9A3C"/>
      <stop offset="1" stop-color="#F26B21"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF1E2"/>
    </linearGradient>
  </defs>

  <!-- nền bo góc -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- bóng đổ quyển sách -->
  <path d="M256 168
           C200 132 132 132 92 150
           V372
           C132 354 200 354 256 390
           C312 354 380 354 420 372
           V150
           C380 132 312 132 256 168 Z"
        fill="#C2410C" opacity="0.25" transform="translate(0,10)"/>

  <!-- trang trái -->
  <path d="M256 168
           C200 132 132 132 92 150
           V372
           C132 354 200 354 256 390 Z"
        fill="url(#page)"/>
  <!-- trang phải -->
  <path d="M256 168
           C312 132 380 132 420 150
           V372
           C380 354 312 354 256 390 Z"
        fill="url(#page)"/>

  <!-- gáy sách -->
  <rect x="248" y="168" width="16" height="222" rx="8" fill="#F26B21"/>

  <!-- dòng chữ trang trái -->
  <g stroke="#F8A661" stroke-width="14" stroke-linecap="round">
    <line x1="132" y1="206" x2="226" y2="222"/>
    <line x1="132" y1="246" x2="226" y2="262"/>
    <line x1="132" y1="286" x2="226" y2="302"/>
    <line x1="132" y1="326" x2="208" y2="340"/>
  </g>
  <!-- dòng chữ trang phải -->
  <g stroke="#F8A661" stroke-width="14" stroke-linecap="round">
    <line x1="380" y1="206" x2="286" y2="222"/>
    <line x1="380" y1="246" x2="286" y2="262"/>
    <line x1="380" y1="286" x2="286" y2="302"/>
    <line x1="380" y1="326" x2="304" y2="340"/>
  </g>
</svg>
